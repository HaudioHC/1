# .github/workflows/civitai_downloader.yml
name: Civitai Creator Image Downloader

on:
  workflow_dispatch:
    inputs:
      creator_username:
        description: 'Creator Username (创作者用户名)'
        required: true
        default: 'civitai'
      nsfw_level:
        description: 'NSFW Level (NSFW 等级)'
        type: choice
        required: true
        default: 'X'
        options:
          - 'All (所有等级)'
          - 'None (仅限安全)'
          - 'Soft'
          - 'Mature'
          - 'X'
      sort_by:
        description: 'Sort Order (排序方式)'
        type: choice
        required: true
        default: 'Newest'
        options:
          - 'Newest'
          - 'Most Reactions'
          - 'Most Comments'
      time_period:
        description: 'Time Period for Sort (排序时间范围)'
        type: choice
        required: true
        default: 'AllTime'
        options:
          - 'AllTime'
          - 'Year'
          - 'Month'
          - 'Week'
          - 'Day'
      page_limit:
        description: 'Page Size / Limit (每页数量, 1-200)'
        type: number
        default: 100
      download_threads:
        description: 'Download Threads (下载线程数, 1-32)'
        type: number
        default: 10
      jpeg_quality:
        description: 'JPEG Quality (JPEG 质量, 1-95)'
        type: number
        default: 92
      scan_passes:
        description: 'Scan Passes (列表扫描轮数, 取并集, 1-10)'
        type: number
        default: 3
      download_retries:
        description: 'Download Retries (下载失败重试次数, 0-10)'
        type: number
        default: 3

jobs:
  download-images:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 4. Run Downloader Script with new options
        run: |
          # 从 'All (所有等级)' 这样的输入中提取出 'All'；默认 X
          NSFW_CHOICE=$(echo "${{ github.event.inputs.nsfw_level || 'X' }}" | awk '{print $1}')
          
          python download_creator_images.py \
            --username "${{ github.event.inputs.creator_username || 'civitai' }}" \
            --nsfw "$NSFW_CHOICE" \
            --sort "${{ github.event.inputs.sort_by || 'Newest' }}" \
            --period "${{ github.event.inputs.time_period || 'AllTime' }}" \
            --limit ${{ github.event.inputs.page_limit || 100 }} \
            --threads ${{ github.event.inputs.download_threads || 10 }} \
            --jpeg-quality ${{ github.event.inputs.jpeg_quality || 92 }} \
            --scan-passes ${{ github.event.inputs.scan_passes || 3 }} \
            --download-retries ${{ github.event.inputs.download_retries || 3 }} \
            --output-dir "./output" \
            --no-zip
          # --no-zip：直接产出 JPEG，避免 Artifact 二次打包形成「zip 套 zip」
            
      - name: 5. Upload Images as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: civitai-images-${{ github.event.inputs.creator_username || 'scheduled' }}-${{ github.run_id }}
          # 上传图片文件本身；下载 Artifact 解压后直接是图片
          path: ./output/**/*.jpeg
          if-no-files-found: 'warn'
          compression-level: 0
